<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ByteZone Kitchen</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* GRID */
#orders {
  padding: 12px;
  display: grid;
  gap: 12px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* TOP */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

/* TAG */
.tag {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: bold;
}

.dine {
  background: #22c55e;
  color: black;
}

.parcel {
  background: #f59e0b;
  color: black;
}

/* SECTION */
.section {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}

/* ITEMS BOX */
.items {
  background: rgba(0,0,0,0.3);
  padding: 8px;
  border-radius: 8px;
  margin-top: 6px;
  line-height: 1.5;
}

/* PRICE */
.price {
  font-size: 16px;
  font-weight: bold;
  color: #38bdf8;
}

/* TIMER */
.timer {
  margin-top: 8px;
  font-size: 15px;
  color: #38bdf8;
}

/* BUTTON GROUP */
.time-group {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.time-btn {
  flex: 1;
  background: #334155;
  color: white;
  border-radius: 6px;
  padding: 6px;
  font-size: 12px;
}

/* DONE BUTTON */
.done-btn {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #22c55e;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">🍳 ByteZone Kitchen</div>

<div id="orders"></div>

<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script>
const API = "https://script.google.com/macros/s/AKfycbz17MiXqsjlAe6FyaJXPQ0r42-RSupYxVWCLH0tA3mzJsnKMtIyq07exh9569aZ82Pt/exec";

let lastCount = 0;
let timers = {};

async function loadOrders(){
  let res = await fetch(API + "?t=" + Date.now());
  let data = await res.json();

  let html = "";
  let count = 0;

  for(let i=data.length-1;i>=1;i--){
    let row = data[i];

    if(row[5] === "Done") continue;

    count++;

    let typeClass = row[2] === "parcel" ? "parcel" : "dine";

    html += `
      <div class="card">

        <div class="top">
          <div class="name">${row[0]}</div>
          <div class="tag ${typeClass}">${row[2]}</div>
        </div>

        <div class="section">
          📞 ${row[1]}
        </div>

        <div class="section">
          🧾 Items:
          <div class="items">${row[3]}</div>
        </div>

        <div class="section price">
          💰 ${row[4]}
        </div>

        <div class="section">
          ⏱ Set Time:
          <div class="time-group">
            ${[1,5,10,15,20].map(t => 
              `<button class="time-btn" onclick="startTimer(${i+1}, ${t}, '${row[1]}')">${t}m</button>`
            ).join("")}
          </div>
        </div>

        <div class="timer" id="timer-${i+1}"></div>

        <button class="done-btn" onclick="markDone(${i+1}, '${row[1]}')">
          ✅ Mark Done
        </button>

      </div>
    `;
  }

  if(count > lastCount){
    document.getElementById("sound").play();
  }

  lastCount = count;

  document.getElementById("orders").innerHTML = html;
}

function startTimer(row, minutes, phone){
  let total = minutes * 60;

  let msg = `Your order from ByteZone will be ready in ${minutes} minutes`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

  if(timers[row]) clearInterval(timers[row]);

  timers[row] = setInterval(()=>{
    total--;

    let m = Math.floor(total/60);
    let s = total % 60;

    document.getElementById(`timer-${row}`).innerText =
      `⏳ ${m}:${s.toString().padStart(2,"0")}`;

    if(total <= 0){
      clearInterval(timers[row]);
      alert("⚠️ Order delayed!");
      document.getElementById("sound").play();
    }

  },1000);
}

async function markDone(row, phone){
  await fetch(API + "?action=update&row=" + row);

  if(timers[row]) clearInterval(timers[row]);

  let msg = "Your order from ByteZone is ready!";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

  loadOrders();
}

setInterval(loadOrders, 3000);
loadOrders();
</script>

</body>
</html>
