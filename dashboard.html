<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kitchen Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

button {
  padding: 8px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🍳 Live Orders</h2>
<div id="orders"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz17MiXqsjlAe6FyaJXPQ0r42-RSupYxVWCLH0tA3mzJsnKMtIyq07exh9569aZ82Pt/exec";

async function loadOrders(){
  let res = await fetch(API + "?t=" + Date.now());
  let data = await res.json();

  let html = "";

  for(let i=1;i<data.length;i++){
    let row = data[i];

    if(row[5] === "Done") continue;

    html += `
      <div class="card">
        <b>${row[0]}</b> (${row[2]})<br>
        📞 ${row[1]}<br>
        🧾 ${row[3]}<br>
        💰 ${row[4]}<br>

        <button onclick="markDone(${i+1}, '${row[1]}')">Done</button>
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
}

async function markDone(row, phone){
  await fetch(API + "?action=update&row=" + row);

  let msg = "Your order from ByteZone is ready!";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

  loadOrders();
}

setInterval(loadOrders, 3000);
loadOrders();
</script>

</body>
</html>
