<script>
const API = "https://script.google.com/macros/s/AKfycbzHpV-T456UFaAzNDC5qypN6ioWcBZUUOqyq3Mgaa5YDiUitgQXgbP7AgxqNIIy1sXY/exec";

async function loadOrders(){
  let res = await fetch(API);
  let data = await res.json();

  let html = "";

  for(let i=1;i<data.length;i++){
    let row = data[i];

    if(row[5] === "Done") continue;

    html += `
      <div class="card">
        <b>${row[0]}</b> (${row[2]})<br>
        📞 ${row[1]}<br>
        🧾 ${row[3]}<br>
        💰 ${row[4]}<br>

        <button onclick="markDone(${i+1}, '${row[1]}')">Done</button>
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
}

async function markDone(row, phone){
  // 🔄 Update status in sheet
  await fetch(API + "?action=update&row=" + row);

  // 📲 WhatsApp confirmation
  let msg = "Your order from ByteZone is ready!";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

  loadOrders();
}

setInterval(loadOrders, 3000);
loadOrders();
</script>
