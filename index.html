<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteZone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🍔 ByteZone</header>

<div class="top-bar">
  <div>🛒 Items: <span id="cartCount">0</span></div>
  <button onclick="clearCart()">Clear Order</button>
</div>

<div class="container" id="menu"></div>

<div class="bill">

  <input id="name" placeholder="Customer Name">

  <label>Order Type:</label>
  <select id="type" onchange="calc()">
    <option value="dine">Dine-in</option>
    <option value="parcel">Parcel</option>
  </select>

  <div id="billItems"></div>

  <div class="line"><span>Subtotal</span><span id="subtotal">₹0</span></div>
  <div class="line"><span>Packing</span><span id="packing">₹0</span></div>
  <div class="line total"><span>Total</span><span id="total">₹0</span></div>

  <div style="margin-top:10px;">
    <button onclick="payNow()">Pay via UPI</button>
    <button onclick="sendBill()">Send Bill</button>
  </div>

</div>

<button class="order-btn" onclick="order()">Order Now</button>

<script src="script.js"></script>

</body>
</html>
