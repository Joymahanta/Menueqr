<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteZone</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🍔 ByteZone</header>

<div class="container" id="menu"></div>

<div class="bill">
  <input id="name" placeholder="Customer Name">
  <input id="type" placeholder="Parcel / Dine-in">

  <div class="bill-items" id="billItems"></div>

  <div class="total-line">
    <span>Subtotal</span>
    <span id="subtotal">₹0</span>
  </div>

  <div class="total-line">
    <span>Packing</span>
    <span id="packing">₹0</span>
  </div>

  <div class="total-line bold">
    <span>Total</span>
    <span id="total">₹0</span>
  </div>

  <br>
  <button onclick="payNow()">Pay via UPI</button>
  <button onclick="sendBill()">Send Bill</button>
</div>

<button class="order-btn" onclick="order()">Order Now</button>

<script src="script.js"></script>
</body>
</html></body>
</html>
